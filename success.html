<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Betalning genomförd – MediShop</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .success-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .success-box { max-width: 480px; }
    .checkmark {
      font-size: 4rem;
      margin-bottom: 24px;
      display: block;
    }
    .success-box h1 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
    .success-box p { color: #475569; margin-bottom: 32px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="logo">Medi<span>Shop</span></div>
    </div>
  </header>
  <section class="success-page">
    <div class="success-box">
      <span class="checkmark">✅</span>
      <h1>Tack för din beställning!</h1>
      <p>Din betalning är genomförd. Du kommer att få en bekräftelse via e-post.</p>
      <a href="/" class="btn" style="background:#1a56db;color:white;">Tillbaka till butiken</a>
    </div>
  </section>
</body>
</html>
